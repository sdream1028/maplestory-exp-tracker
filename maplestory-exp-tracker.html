<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>遊戲經驗值追蹤工具 (精準擷取版)</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; color: #333; max-width: 900px; margin: 0 auto; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .input-group { margin: 10px 0; display: flex; align-items: center; }
        .input-group label { width: 120px; font-weight: bold; }
        input[type="text"], input[type="number"] { padding: 8px; width: 150px; border: 1px solid #ccc; border-radius: 4px; }
        button { background-color: #4CAF50; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-size: 15px; margin: 5px; }
        button:hover { background-color: #45a049; }
        .action-btn { background-color: #008CBA; }
        .action-btn:hover { background-color: #007B9E; }
        #status { color: #d9534f; font-weight: bold; margin-top: 10px; }
        
        /* 畫布與擷取區域的樣式 */
        #canvasContainer { position: relative; max-width: 100%; overflow: auto; border: 2px dashed #ccc; margin-top: 10px; display: none; }
        canvas { cursor: crosshair; display: block; }
        .toolbar { margin-top: 10px; display: none; padding: 10px; background: #eef; border-radius: 5px; }
        
        #expChart { margin-top: 20px; }
    </style>
</head>
<body>

    <h2>📈 經驗值追蹤工具 (精準擷取版)</h2>

    <div class="card">
        <h3>1. 擷取遊戲視窗畫面</h3>
        <button id="captureBtn">🖥️ 選擇視窗並擷取畫面</button>
        <div id="status"></div>
        
        <div id="canvasContainer">
            <canvas id="screenCanvas"></canvas>
        </div>

        <div class="toolbar" id="ocrToolbar">
            <p><strong>第一步：</strong>用滑鼠在上方圖片中<strong>框選</strong>數值區域。<br>
               <strong>第二步：</strong>點擊下方按鈕進行辨識：</p>
            <button class="action-btn" onclick="recognizeSelected('name')">🏷️ 辨識為【角色名稱】</button>
            <button class="action-btn" onclick="recognizeSelected('lv')">⭐ 辨識為【等級】</button>
            <button class="action-btn" onclick="recognizeSelected('exp')">💯 辨識為【經驗值】</button>
        </div>
    </div>

    <div class="card" id="dataCheck">
        <h3>2. 確認與儲存資料</h3>
        <p>辨識結果會出現在這裡，請確認無誤後儲存：</p>
        <div class="input-group">
            <label for="nameInput">角色名稱: </label>
            <input type="text" id="nameInput" placeholder="等待辨識或手動輸入">
        </div>
        <div class="input-group">
            <label for="lvInput">等級 (LV): </label>
            <input type="number" id="lvInput" placeholder="等待辨識或手動輸入">
        </div>
        <div class="input-group">
            <label for="expInput">經驗值 (%): </label>
            <input type="number" id="expInput" step="0.01" placeholder="等待辨識或手動輸入">
        </div>
        <button id="saveBtn">💾 儲存並更新圖表</button>
    </div>

    <div class="card">
        <h3>📊 成長圖表</h3>
        <button id="clearBtn" style="background-color: #ff4c4c;">🗑️ 清除所有紀錄</button>
        <canvas id="expChart"></canvas>
    </div>

    <script>
        let chartInstance = null;
        let records = JSON.parse(localStorage.getItem('expRecords')) || [];
        
        // --- 畫布與框選相關變數 ---
        const canvas = document.getElementById('screenCanvas');
        const ctx = canvas.getContext('2d');
        let baseImage = new Image(); // 儲存原始截圖
        let isDrawing = false;
        let startX, startY, currentX, currentY;
        let selectionRect = null; // 儲存最後框選的區域 {x, y, w, h}

        // --- 1. 螢幕擷取邏輯 ---
        document.getElementById('captureBtn').addEventListener('click', async () => {
            const statusEl = document.getElementById('status');
            try {
                statusEl.innerText = "請選擇遊戲視窗...";
                // 呼叫瀏覽器 API 取得畫面
                const stream = await navigator.mediaDevices.getDisplayMedia({ video: true });
                const video = document.createElement('video');
                video.srcObject = stream;
                
                video.onloadedmetadata = () => {
                    video.play();
                    // 稍微延遲一下，確保畫面有渲染出來
                    setTimeout(() => {
                        // 設定畫布大小與視窗相同
                        canvas.width = video.videoWidth;
                        canvas.height = video.videoHeight;
                        
                        // 將影片當前畫面畫到畫布上
                        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                        
                        // 將畫布內容存成圖片，方便後續重繪
                        baseImage.src = canvas.toDataURL();
                        
                        // 停止畫面分享 (因為我們只需要一張截圖)
                        stream.getTracks().forEach(track => track.stop());
                        
                        // 顯示畫布和工具列
                        document.getElementById('canvasContainer').style.display = 'block';
                        document.getElementById('ocrToolbar').style.display = 'block';
                        statusEl.innerText = "✅ 擷取成功！請用滑鼠在圖片上框選數值。";
                    }, 500);
                };
            } catch (err) {
                console.error("螢幕擷取失敗:", err);
                statusEl.innerText = "❌ 無法取得畫面，請允許螢幕分享權限。";
            }
        });

        // --- 2. 畫布框選邏輯 (滑鼠事件) ---
        canvas.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            startX = e.clientX - rect.left;
            startY = e.clientY - rect.top;
            isDrawing = true;
            selectionRect = null; // 重置選擇
        });

        canvas.addEventListener('mousemove', (e) => {
            if (!isDrawing) return;
            const rect = canvas.getBoundingClientRect();
            currentX = e.clientX - rect.left;
            currentY = e.clientY - rect.top;
            
            // 每次移動都要先清空畫布，畫上底圖，再畫紅框
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(baseImage, 0, 0);
            
            ctx.strokeStyle = "red";
            ctx.lineWidth = 2;
            ctx.strokeRect(startX, startY, currentX - startX, currentY - startY);
            
            // 畫個半透明遮罩讓框選區域更明顯
            ctx.fillStyle = "rgba(255, 0, 0, 0.2)";
            ctx.fillRect(startX, startY, currentX - startX, currentY - startY);
        });

        canvas.addEventListener('mouseup', (e) => {
            if (!isDrawing) return;
            isDrawing = false;
            
            // 計算最終的 x, y, width, height (處理往左上角畫的情況)
            const width = Math.abs(currentX - startX);
            const height = Math.abs(currentY - startY);
            const x = Math.min(startX, currentX);
            const y = Math.min(startY, currentY);
            
            if (width > 5 && height > 5) {
                selectionRect = { x, y, w: width, h: height };
            }
        });

        // --- 3. 針對框選區域進行辨識 ---
        async function recognizeSelected(type) {
            const statusEl = document.getElementById('status');
            
            if (!selectionRect) {
                alert("請先用滑鼠在圖片上畫出紅框，圈出要辨識的範圍！");
                return;
            }

            statusEl.innerText = "⏳ 正在辨識框選區域，請稍候...";

            // 建立一個暫存的小畫布，把剛剛框選的區域複製過來
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = selectionRect.w;
            tempCanvas.height = selectionRect.h;
            const tempCtx = tempCanvas.getContext('2d');
            
            // 從大畫布裁切出小區域畫到小畫布
            tempCtx.drawImage(
                baseImage, 
                selectionRect.x, selectionRect.y, selectionRect.w, selectionRect.h, // 來源裁切位置
                0, 0, selectionRect.w, selectionRect.h // 目標繪製位置
            );

            // 將小畫布轉成圖片資料交給 Tesseract
            const dataUrl = tempCanvas.toDataURL();

            try {
                // 如果是辨識文字，我們可以用中文包；如果是數字，有時候純英文包辨識數字更準
                const lang = (type === 'name') ? 'eng+chi_tra' : 'eng';
                
                const result = await Tesseract.recognize(dataUrl, lang);
                let text = result.data.text.trim();
                console.log(`辨識結果 (${type}):`, text);

                // 根據不同的按鈕，清理並填入對應的欄位
                if (type === 'name') {
                    // 名稱：去掉換行符號
                    text = text.replace(/[\r\n]+/g, '');
                    document.getElementById('nameInput').value = text;
                } 
                else if (type === 'lv') {
                    // 等級：只保留數字
                    text = text.replace(/\D/g, ''); 
                    document.getElementById('lvInput').value = text;
                } 
                else if (type === 'exp') {
                    // 經驗值：只保留數字和小數點
                    text = text.replace(/[^\d.]/g, ''); 
                    document.getElementById('expInput').value = text;
                }

                statusEl.innerText = "✅ 辨識完成！可繼續框選下一個數值，或直接儲存。";

            } catch (error) {
                console.error(error);
                statusEl.innerText = "❌ 辨識失敗，請重試或手動輸入。";
            }
        }

        // --- 4. 儲存資料與圖表邏輯 (與之前相同) ---
        document.getElementById('saveBtn').addEventListener('click', function() {
            const name = document.getElementById('nameInput').value || '未命名';
            const lv = parseFloat(document.getElementById('lvInput').value);
            const exp = parseFloat(document.getElementById('expInput').value);

            if (isNaN(lv) || isNaN(exp)) {
                alert("請填寫正確的等級與經驗值數字！");
                return;
            }

            const dayNum = records.length + 1;
            records.push({ day: `Day ${dayNum}`, name: name, lv: lv, exp: exp });
            localStorage.setItem('expRecords', JSON.stringify(records));

            // 清空輸入框
            document.getElementById('nameInput').value = '';
            document.getElementById('lvInput').value = '';
            document.getElementById('expInput').value = '';
            document.getElementById('status').innerText = '資料已儲存！';

            renderChart();
        });

        document.getElementById('clearBtn').addEventListener('click', function() {
            if(confirm("確定要刪除所有的紀錄嗎？此動作無法復原！")) {
                records = [];
                localStorage.removeItem('expRecords');
                renderChart();
            }
        });

        function renderChart() {
            const ctx = document.getElementById('expChart').getContext('2d');
            const labels = records.map(r => r.day);
            const expData = records.map(r => r.exp);
            const lvData = records.map(r => r.lv);
            const nameData = records.map(r => r.name);

            if (chartInstance) chartInstance.destroy(); 

            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '經驗值 (%)',
                        data: expData,
                        borderColor: '#00cc66',
                        backgroundColor: 'rgba(0, 204, 102, 0.2)',
                        borderWidth: 2, pointRadius: 5, pointHoverRadius: 8, fill: true, tension: 0.1
                    }]
                },
                options: {
                    responsive: true,
                    scales: { y: { beginAtZero: true, max: 100 } },
                    plugins: {
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    let index = context.dataIndex;
                                    return ` ${nameData[index]} | LV: ${lvData[index]} | 經驗值: ${context.parsed.y}%`;
                                }
                            }
                        }
                    }
                }
            });
        }

        renderChart();
    </script>
</body>
</html>
